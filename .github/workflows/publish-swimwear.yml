name: Publish swimwear roundup

# One-shot scheduled publish for the swimwear roundup.
#
# The Journal has no draft state: lib/journal.ts publishes a piece the moment
# its .md lands in content/journal/, and Vercel deploys on push to main. So
# "schedule a post" means "merge the branch on a timer", which is what this does.
#
# Fires Sat 2026-07-18 at 10:00 America/Los_Angeles (17:00 UTC, PDT = UTC-7).
# GitHub cron is UTC-only and has no DST awareness, hence the hardcoded 17.
# Scheduled runs can be delayed by several minutes under load; this is a
# publish, not a launch, so that is fine.
#
# This file lives on main because GitHub only runs scheduled workflows from the
# default branch. The article sits on swimwear-roundup until this merges it.
#
# DELETE THIS FILE once it has run. The date guard makes it inert on any other
# Saturday, but leaving dead scheduled workflows around is how they fire by
# accident later.

on:
  schedule:
    - cron: "0 17 * * 6"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Verify only (checks perms + hero, does not publish)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run
        id: gate
        run: |
          TODAY="$(date -u +%F)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger. dry_run=${{ inputs.dry_run }}"
            echo "go=true" >> "$GITHUB_OUTPUT"
            echo "dry=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          elif [ "$TODAY" = "2026-07-18" ]; then
            echo "Scheduled date reached ($TODAY). Publishing for real."
            echo "go=true" >> "$GITHUB_OUTPUT"
            echo "dry=false" >> "$GITHUB_OUTPUT"
          else
            echo "Today is $TODAY, not 2026-07-18. Nothing to do."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.go == 'true'
        with:
          fetch-depth: 0

      # headerLayout: "split" renders the hero as the portrait beside the title,
      # so a missing hero is a visibly broken published page. Fail loudly here
      # rather than ship it.
      - name: Verify the article and its hero exist on the branch
        if: steps.gate.outputs.go == 'true'
        run: |
          git checkout swimwear-roundup
          for f in \
            "public/journal/best-non-toxic-swimwear-natural-fiber.jpg" \
            "content/journal/best-non-toxic-swimwear-natural-fiber.md"
          do
            if [ ! -f "$f" ]; then
              echo "::error::$f is missing on swimwear-roundup. Refusing to publish."
              exit 1
            fi
            echo "ok: $f ($(wc -c < "$f") bytes)"
          done

      - name: Merge swimwear-roundup into main
        if: steps.gate.outputs.go == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-ff swimwear-roundup -m "Publish: non-toxic swimwear roundup + shop collection"

          if [ "${{ steps.gate.outputs.dry }}" = "true" ]; then
            # Proves the token can actually write to main without publishing.
            # If this fails, the real Saturday run would have failed silently.
            echo "DRY RUN: testing push access, not publishing."
            git push --dry-run origin main
            echo "Push access confirmed. Nothing was published."
          else
            git push origin main
            echo "Merged and pushed. Vercel will deploy from main."
          fi
